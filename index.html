<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Perpustakaan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(rgba(0,0,50,0.6),rgba(0,0,80,0.7)),
url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center/cover;
min-height:100vh;
}

/* HEADER */
.main-header{
position:fixed;
top:0;
width:100%;
padding:10px 20px;
z-index:1000;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.1);
display:flex;
align-items:center;
gap:15px;
color:white;
}

.main-header img{width:50px}

.main-content{
margin-top:100px;
padding-bottom:80px;
}

/* FOOTER */
.main-footer{
position:fixed;
bottom:0;
width:100%;
text-align:center;
padding:10px;
color:white;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

/* CARD */
.glass{
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.15);
border-radius:20px;
border:1px solid rgba(255,255,255,0.3);
box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

.container{
max-width:1000px;
margin:30px auto;
padding:25px;
color:white;
text-align:center;
}

/* INPUT & BUTTON */
input{
width:95%;
padding:10px;
margin:6px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(135deg,#0052cc,#003366);
color:white;
}

/* TABLE */
table{
width:100%;
margin-top:15px;
border-collapse:collapse;
background:rgba(255,255,255,0.1);
}
th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.status-active{color:#00ff88}
.status-expired{color:#ff4d4d}

/* MARQUEE */
.marquee{overflow:hidden}
.marquee span{
display:inline-block;
padding-left:100%;
animation:marquee 12s linear infinite;
}
@keyframes marquee{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="main-header">
<img src="logo_mds.png">
<div>
<b>MAJLIS DAERAH SIMUNJAN</b><br>
<small>Sistem Pengurusan Perpustakaan</small>
</div>
</div>

<div class="main-content">

<!-- LOGIN -->
<div class="container glass" id="loginPage">
<h2>Log Masuk</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Log Masuk</button>
</div>

<!-- MENU -->
<div class="container glass" id="menuPage" style="display:none">
<h2>Menu Utama</h2>

<div class="marquee">
<span>INFO TERKINI: Sistem Perpustakaan Digital Kini Lebih Pantas</span>
</div>

<br>
<button onclick="showPage('daftarPage')">Daftar Ahli</button>
<button onclick="showPage('semakPage')">Semak Ahli</button>
<button onclick="showPage('bukuPage')">Carian Buku</button>

<br><br>
<button onclick="showPage('loginPage')">Log Keluar</button>
</div>

<!-- DAFTAR -->
<div class="container glass" id="daftarPage" style="display:none">
<h2>Daftar Ahli</h2>
<input id="nama" placeholder="Nama">
<input id="ic" placeholder="No IC 12 digit">
<input id="jantina" placeholder="Jantina" readonly>
<input id="alamat" placeholder="Alamat">

<button onclick="daftarAhli()">Daftar</button>

<table id="tableAhli">
<tr><th>No</th><th>Nama</th><th>IC</th><th>Jantina</th><th>Alamat</th><th>Tarikh</th><th>Luput</th></tr>
</table>

<button onclick="showPage('menuPage')">Kembali</button>
</div>

<!-- SEMAK -->
<div class="container glass" id="semakPage" style="display:none">
<h2>Semakan</h2>
<input id="semakIC" placeholder="Masukkan IC">
<button onclick="semakAhli()">Semak</button>
<table id="tableSemak"></table>
<button onclick="showPage('menuPage')">Kembali</button>
</div>

<!-- BUKU -->
<div class="container glass" id="bukuPage" style="display:none">
<h2>Carian Buku</h2>
<input id="cariBuku" placeholder="Cari buku...">
<button onclick="cariBuku()">Cari</button>
<table id="tableBuku"></table>
<button onclick="showPage('menuPage')">Kembali</button>
</div>

</div>

<!-- FOOTER -->
<div class="main-footer">
© 2026 Majlis Daerah Simunjan
</div>

<script>
let ahliList=[];
let counter=1;

function showPage(page){
document.querySelectorAll('.container').forEach(p=>p.style.display='none');
document.getElementById(page).style.display='block';
}

/* LOGIN */
function login(){
let u=document.getElementById('user').value;
let p=document.getElementById('pass').value;

if(u==="admin" && p==="1234"){
showPage('menuPage');
}else{
alert("Login gagal");
}
}

/* AUTO JANTINA */
document.getElementById('ic').addEventListener('input', function () {
    let ic = this.value.replace(/\D/g, ''); // buang semua bukan nombor

    // limit 12 digit
    ic = ic.substring(0, 12);

    // format jadi 000000-00-0000
    let formatted = ic;
    if (ic.length > 6 && ic.length <= 8)
        formatted = ic.slice(0, 6) + '-' + ic.slice(6);
    else if (ic.length > 8)
        formatted = ic.slice(0, 6) + '-' + ic.slice(6, 8) + '-' + ic.slice(8);

    this.value = formatted;

    // auto jantina
    if (ic.length === 12) {
        document.getElementById('jantina').value =
            ic.slice(-1) % 2 === 0 ? 'Perempuan' : 'Lelaki';
    }
});

/* DAFTAR */
function daftarAhli(){

let icRaw = ic.replace(/\D/g,'');

if(icRaw.length !== 12){
 alert("IC mesti 12 digit!");
 return;
}    
    
let nama=document.getElementById('nama').value;
let ic=document.getElementById('ic').value;
let jantina=document.getElementById('jantina').value;
let alamat=document.getElementById('alamat').value;

/* TARIKH AUTO */
let today=new Date();
let tarikh=today.toISOString().split('T')[0];

let noAhli='MDSPA'+String(counter).padStart(4,'0');
counter++;

let tarikhLuput=new Date(today);
tarikhLuput.setFullYear(tarikhLuput.getFullYear()+1);

let ahli={noAhli,nama,ic,jantina,alamat,tarikh,tarikhLuput};
ahliList.push(ahli);

let row=`<tr>
<td>${noAhli}</td>
<td>${nama}</td>
<td>${ic}</td>
<td>${jantina}</td>
<td>${alamat}</td>
<td>${tarikh}</td>
<td>${tarikhLuput.toISOString().split('T')[0]}</td>
</tr>`;

document.getElementById('tableAhli').innerHTML+=row;

alert("Ahli berjaya didaftarkan!");
}

/* SEMAK */
function semakAhli(){
let ic=document.getElementById('semakIC').value;
let result=ahliList.find(a=>a.ic===ic);
let table=document.getElementById('tableSemak');

if(result){
let today=new Date();
let status=today>result.tarikhLuput?
'<span class="status-expired">LUPUT</span>':
'<span class="status-active">AKTIF</span>';

table.innerHTML=`<tr><th>No</th><th>Nama</th><th>Status</th></tr>
<tr><td>${result.noAhli}</td><td>${result.nama}</td><td>${status}</td></tr>`;
}else{
table.innerHTML="<tr><td>Tiada rekod</td></tr>";
}
}

/* BUKU */
let bukuList=[
{tajuk:"Rekabentuk Sistem",penulis:"Ahmad"},
{tajuk:"JavaScript Asas",penulis:"Ali"},
{tajuk:"HTML CSS",penulis:"Siti"}
];

function cariBuku(){
let key=document.getElementById('cariBuku').value.toLowerCase();
let table=document.getElementById('tableBuku');

table.innerHTML="<tr><th>Tajuk</th><th>Penulis</th></tr>";

bukuList
.filter(b=>b.tajuk.toLowerCase().includes(key))
.forEach(b=>{
table.innerHTML+=`<tr><td>${b.tajuk}</td><td>${b.penulis}</td></tr>`;
});
}
</script>

</body>
</html>
